server:
  port: 5000

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: false

      routes:

        # USER SERVICE
        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**

        - id: user-service-users
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: user-service-admin
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/admin/users/**

        - id: user-service-direct
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**

        # SALON SERVICE
        - id: salon-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path=/api/salons/**

        - id: salon-admin-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path=/api/admin/salons/**

        - id: salon-direct-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path=/salons/**

        # BOOKING SERVICE
        - id: BOOKING-SERVICE
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/bookings/**

        # PAYMENT SERVICE
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**

        # CATEGORY SERVICE
        - id: CATEGORY-SERVICE
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/categories/**

        # SERVICE OFFERING
        - id: service-offering
          uri: lb://SERVICE-OFFERING
          predicates:
            - Path=/api/service-offering/**


        - id: notifications
          uri: lb://NOTIFICATIONS
          predicates:
            - Path=/api/notifications/**

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/master/protocol/openid-connect/certs

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    org.springframework.web.reactive: DEBUG