services:

  userdb:
    image: mysql
    container_name: userdb
    ports:
      - 3301:3306
    healthcheck:
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : userdb
    networks:
      - kvl18
  
  bookingdb:
    image: mysql
    container_name: bookingdb
    ports:
      - 3302:3306
    healthcheck:
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : bookingdb
    networks:
      - kvl18
  
  categorydb:
    image: mysql
    container_name: categorydb
    ports:
      - 3303:3306
    healthcheck:
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : categorydb
    networks:
      - kvl18

  paymentdb:              
    image: mysql
    container_name: paymentdb
    ports:
      - 3304:3306
    healthcheck:
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : paymentdb
    networks:
      - kvl18
  
  serviceofferingdb:

    image: mysql
    container_name: serviceofferingdb
    ports:
      - 3307:3306
    healthcheck:
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : serviceofferingdb
    networks:
      - kvl18

  salondb:
    image: mysql    
    container_name: salondb
    ports:
      - 3305:3306
    healthcheck: 
      test: ["CMD" , "mysqladmin","ping", "-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s   
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE : salondb  
    networks:
      - kvl18


  eurekaserver:
    image: "kvl18/salon-eurekaserver:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL","curl --fail --silent eurekaserver:8070/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    container_name: eurekaserver

    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - kvl18


  user:
    image: "kvl18/salon-user:v1"
    ports:
      - "5001:5001"
    healthcheck:
      test: [ "CMD-SHELL","curl --fail --silent user:5001/actuator/health/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    container_name: user
    depends_on:
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/userdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - kvl18

  booking:
    image: "kvl18/salon-booking:v1"
