server:
  port: 5008

spring:
  application:
    name: REVIEW-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/review_db?createDatabaseIfNotExist=true
    username: root
    password: Kvishwash@2001
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

logging:
  level:
    com.kvl: DEBUG